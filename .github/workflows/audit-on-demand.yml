name: Run Phase Audit (v8.0)

on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'Target repo (owner/repo)'
        required: true
        default: 'johnnylugm-tech/tts-kokoro-v613'
      phase:
        description: 'Phase number (1-8)'
        required: true
        default: '1'
      branch:
        description: 'Target branch'
        required: false
        default: 'main'

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout claude_audit repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run audit (phase_auditor.py v8.0)
        id: audit
        run: |
          # Build report path
          REPO="${{ github.event.inputs.repo }}"
          OWNER=$(echo "$REPO" | cut -d/ -f1)
          REPO_NAME=$(echo "$REPO" | cut -d/ -f2)
          BRANCH="${{ github.event.inputs.branch }}"
          REPORT_DIR="reports/${OWNER}/${REPO_NAME}/${BRANCH}"
          mkdir -p "$REPORT_DIR"
          TIMESTAMP=$(date -u +%Y%m%d_%H%M%S)
          REPORT_FILE="${REPORT_DIR}/audit_phase${{ github.event.inputs.phase }}_${TIMESTAMP}.md"

          # Export report path BEFORE running audit (so downstream always has it)
          echo "report_file=${REPORT_FILE}" >> $GITHUB_OUTPUT

          # Run audit — exit code 0=PASS, 1=CONDITIONAL_PASS, 2=FAIL
          # All three are valid outcomes that produce a report
          python3 phase_auditor.py \
            --repo "$REPO" \
            --phase "${{ github.event.inputs.phase }}" \
            --branch "$BRANCH" \
            --save "${REPORT_FILE}" \
            && AUDIT_RC=$? || AUDIT_RC=$?

          echo "audit_rc=${AUDIT_RC}" >> $GITHUB_OUTPUT

          # Only fail if audit crashed (rc > 2 means unexpected error)
          if [ "$AUDIT_RC" -gt 2 ]; then
            echo "❌ Audit crashed with unexpected exit code: $AUDIT_RC" >&2
            exit 1
          fi

          echo "✅ Audit completed (exit code $AUDIT_RC)"

      - name: Extract verdict from report
        id: verdict
        run: |
          REPORT="${{ steps.audit.outputs.report_file }}"
          if [ ! -f "$REPORT" ]; then
            echo "❌ Report file not found: $REPORT" >&2
            echo "VERDICT=ERROR" >> $GITHUB_OUTPUT
            echo "REPORT=" >> $GITHUB_OUTPUT
            exit 1
          fi
          # Extract verdict from table: "| 裁決 | ✅ **通過** |"
          VERDICT=$(sed -n '/^| 裁決 |/p' "$REPORT" | sed 's/^|[^|]*|\s*//;s/\s*|$//' | sed 's/<[^>]*>//g' | xargs)
          if [ -z "$VERDICT" ]; then
            VERDICT="ERROR (could not extract)"
          fi
          echo "✅ Verdict: $VERDICT"
          echo "VERDICT=$VERDICT" >> $GITHUB_OUTPUT
          echo "REPORT=$REPORT" >> $GITHUB_OUTPUT

      - name: Commit and push report
      - name: Commit and push report
        run: |
          set -eo pipefail
          git config user.name "claude-audit-bot"
          git config user.email "audit-bot@noreply.github.com"
          git add reports/

          VERDICT="${{ steps.verdict.outputs.VERDICT }}"

          if git diff --cached --quiet; then
            echo "✅ No new report changes to commit."
          else
            git commit -m "audit: ${{ github.event.inputs.repo }} phase ${{ github.event.inputs.phase }} (${{ github.event.inputs.branch }}) — ${VERDICT}"
            git push
            echo "✅ Report committed and pushed."
          fi

      - name: Job summary
        if: always()
        run: |
          REPORT_FILE="${{ steps.verdict.outputs.REPORT }}"
          if [ -f "$REPORT_FILE" ]; then
            echo "## Phase ${{ github.event.inputs.phase }} Audit Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Repo**: ${{ github.event.inputs.repo }}" >> $GITHUB_STEP_SUMMARY
            echo "**Verdict**: ${{ steps.verdict.outputs.VERDICT }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Full Report</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat "$REPORT_FILE" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Audit Failed" >> $GITHUB_STEP_SUMMARY
            echo "No report was generated. Check the workflow logs." >> $GITHUB_STEP_SUMMARY
          fi
