name: Run Phase Audit (On Demand)

on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'Target repo (owner/repo)'
        required: true
        default: 'johnnylugm-tech/tts-kokoro-v613'
      phase:
        description: 'Phase number (1-8)'
        required: true
        default: '1'
      branch:
        description: 'Target branch'
        required: false
        default: 'main'

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout claude_audit repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install gh CLI
        run: |
          type -p curl >/dev/null || (sudo apt-get update && sudo apt-get install -y curl)
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | \
            sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | \
            sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt-get update && sudo apt-get install -y gh

      - name: Authenticate gh CLI
        run: echo "${{ secrets.GH_PAT }}" | gh auth login --with-token

      - name: Run audit
        id: audit
        run: |
          chmod +x audit.sh
          ./audit.sh \
            --repo "${{ github.event.inputs.repo }}" \
            --phase "${{ github.event.inputs.phase }}" \
            --branch "${{ github.event.inputs.branch }}"
        continue-on-error: true

      - name: Commit and push report
        run: |
          git config user.name "claude-audit-bot"
          git config user.email "audit-bot@noreply.github.com"
          git add reports/
          if git diff --cached --quiet; then
            echo "No new report to commit."
          else
            VERDICT=$(grep "裁決" reports/**/**/**/**/*.md 2>/dev/null | tail -1 | sed 's/.*\*\*\(.*\)\*\*.*/\1/' || echo "unknown")
            git commit -m "audit: ${{ github.event.inputs.repo }} phase ${{ github.event.inputs.phase }} (${{ github.event.inputs.branch }}) — ${VERDICT}"
            git push
          fi
