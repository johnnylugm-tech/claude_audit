name: Run Phase Audit (v6.109)

on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'Target repo (owner/repo)'
        required: true
        default: 'johnnylugm-tech/tts-kokoro-v613'
      phase:
        description: 'Phase number (1-8)'
        required: true
        default: '1'
      branch:
        description: 'Target branch'
        required: false
        default: 'main'

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      # GitHub token for gh CLI (works for public repos)
      GH_TOKEN: ${{ secrets.GH_PAT || github.token }}

    steps:
      - name: Checkout claude_audit repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify gh CLI installed
        run: |
          which gh >/dev/null 2>&1 && gh --version || echo "gh not in PATH, using fallback"
          # GitHub Actions runners include gh CLI by default on ubuntu-latest

      - name: Run audit (phase_auditor.py v6.109)
        id: audit
        run: |
          # Replace / with _ in repo name to avoid path issues
          REPO_SAFE="${{ github.event.inputs.repo }}"
          REPO_SAFE="${REPO_SAFE////_}"
          REPORT_FILE="reports/audit_${REPO_SAFE}_phase${{ github.event.inputs.phase }}.md"
          echo "REPORT_FILE=${REPORT_FILE}" >> $GITHUB_ENV
          python3 phase_auditor.py \
            --repo "${{ github.event.inputs.repo }}" \
            --phase "${{ github.event.inputs.phase }}" \
            --branch "${{ github.event.inputs.branch }}" \
            --save "${REPORT_FILE}"
        continue-on-error: true

      - name: Extract verdict from report
        id: verdict
        run: |
          REPORT="${REPORT_FILE}"
          if [ ! -f "$REPORT" ]; then
            echo "❌ Report not found: $REPORT" >&2
            echo "VERDICT=ERROR (file not found)" >> $GITHUB_OUTPUT
            exit 1
          fi
          # Extract verdict line (e.g., "| 裁決 | ❌ **不通過** |")
          VERDICT=$(grep "^| 裁決" "$REPORT" | sed 's/.*\*\*\(.*\)\*\*.*/\1/' || echo "unknown")
          echo "VERDICT=$VERDICT" >> $GITHUB_OUTPUT
          echo "REPORT=$REPORT" >> $GITHUB_OUTPUT

      - name: Commit and push report
        if: always()
        run: |
          git config user.name "claude-audit-bot"
          git config user.email "audit-bot@noreply.github.com"
          git add -A reports/ || true

          REPORT_FILE="${{ steps.verdict.outputs.REPORT }}"
          VERDICT="${{ steps.verdict.outputs.VERDICT }}"

          if [ -z "$VERDICT" ]; then
            VERDICT="ERROR"
          fi

          if git diff --cached --quiet; then
            echo "✅ No new report changes."
          else
            git commit -m "audit: ${{ github.event.inputs.repo }} phase ${{ github.event.inputs.phase }} (${{ github.event.inputs.branch }}) — ${VERDICT}"
            git push
            echo "✅ Report committed and pushed."
          fi

      - name: Job summary
        if: always()
        run: |
          REPORT_FILE="${{ steps.verdict.outputs.REPORT }}"
          if [ -f "$REPORT_FILE" ]; then
            echo "## Phase ${{ github.event.inputs.phase }} Audit Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Repo**: ${{ github.event.inputs.repo }}" >> $GITHUB_STEP_SUMMARY
            echo "**Verdict**: ${{ steps.verdict.outputs.VERDICT }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Full Report</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat "$REPORT_FILE" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi
